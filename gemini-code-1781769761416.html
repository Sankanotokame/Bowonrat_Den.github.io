<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>กิจกรรมทั้งหมด</h1>
        <div class="product card">
            <div class="image">
                <img src="IMG_6832.JPG" alt="Home Theater Contest" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
            </div>
            <div>
                <h2>Home Theater</h2>
                <p>การแข่งขันออกแบบโรงหนังเป็นรูปแบบวีดิโอด้วย AI</p>
                <ul>
                    <li>ได้รับรางวัลเป็น โคมไฟ</li>
                    <li>ใช้ zenity x ในการสร้างคลิป</li>
                    <li>ตัดต่อด้วยแอป capcut</li>
                </ul>
                <button class="btn">ดูรายละเอียด</button>
            </div>
        </div>
    </main>
</body>
</html>
